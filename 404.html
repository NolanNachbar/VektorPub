    <!-- Strip tracking params (ref, utm_*) before anything else loads -->
    <script>
      (function() {
        var url = new URL(window.location.href);
        var dirty = false;
        ['ref', 'utm_source', 'utm_medium', 'utm_campaign', 'utm_term', 'utm_content'].forEach(function(k) {
          if (url.searchParams.has(k)) { url.searchParams.delete(k); dirty = true; }
        });
        if (dirty) { window.location.replace(url.toString()); }
      })();
    </script>
    <!-- GitHub Pages SPA redirect handler -->
    <script>
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
